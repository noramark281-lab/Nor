name: Build & Publish Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Decode Android Keystore
      run: |
        mkdir -p app
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
        fi

    - name: Build Android APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEYSTORE_PATH: app/release.keystore
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        MEXC_API_KEY: ${{ secrets.MEXC_API_KEY }}
        MEXC_SECRET_KEY: ${{ secrets.MEXC_SECRET_KEY }}
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon
        else
          echo "Gradle wrapper not found, building package..."
        fi

    - name: Upload APK Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MEXC-EventFutures-Android-APK
        path: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk

    - name: Create Automatic GitHub Release & Direct Download Link
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: MEXC Event Futures Release v1.0.${{ github.run_number }}
        body: |
          🚀 تم بناء وتوقيع تطبيق الأندرويد بنجاح!
          - تداول العقود الآجلة للأحداث (MEXC Event Futures)
          - مفاتيح API الآمنة مفعلة تلقائياً
          - تحميل مباشر وسريع للتطبيق على الهاتف.
        files: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.TOKEN_NOR || secrets.GITHUB_TOKEN }}
