name: Build Signed APK & Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify keystore secret exists
        run: |
          if [ -z "${{ secrets.UPLOAD_KEYSTORE }}" ]; then
            echo "❌ Error: UPLOAD_KEYSTORE secret is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then
            echo "❌ Error: KEYSTORE_PASSWORD secret is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "❌ Error: KEY_PASSWORD secret is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then
            echo "❌ Error: KEY_ALIAS secret is missing!"
            exit 1
          fi
          echo "✅ All keystore secrets are present."

      - name: Decode keystore
        run: |
          echo "${{ secrets.UPLOAD_KEYSTORE }}" | base64 -d > android/app/upload-keystore.jks
          ls -la android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF
          cat android/key.properties

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons
        timeout-minutes: 15

      - name: Verify APK exists
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found at $APK_PATH"
            exit 1
          fi
          ls -lh "$APK_PATH"
          echo "✅ APK built successfully: $(du -h $APK_PATH | cut -f1)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mexc-event-trader-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release & Upload APK
        id: create_release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "MEXC Event Trader v${{ github.run_number }}"
          body: |
            🚀 إصدار تلقائي لتطبيق MEXC Event Trader
            - ✅ بناء مستقر (Stable Build)
            - ✅ توقيع رقمي (Signed APK)
            - ✅ جاهز للتثبيت على Android 5.0+ (API 21)
            - ✅ رابط التحميل المباشر في الأسفل
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print download link
        if: steps.create_release.outcome == 'success'
        run: |
          echo ""
          echo "========================================"
          echo "🎉 BUILD SUCCESSFUL!"
          echo "========================================"
          echo "📦 Release URL: https://github.com/${{ github.repository }}/releases/tag/v${{ github.run_number }}"
          echo "📥 Direct APK: https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/app-release.apk"
          echo "========================================"
